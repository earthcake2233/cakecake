name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cakecake-vue/bilibili-vue/package-lock.json

      - name: Install dependencies
        working-directory: cakecake-vue/bilibili-vue
        run: npm ci

      - name: Run tests with coverage
        working-directory: cakecake-vue/bilibili-vue
        run: npm run coverage

      - name: Upload coverage to Codecov
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --verbose create-commit             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --ci-passed true             --token "${{ secrets.CODECOV_TOKEN }}"
          ./codecov --verbose upload-coverage             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --token "${{ secrets.CODECOV_TOKEN }}"             --file ./cakecake-vue/bilibili-vue/coverage/lcov.info             --flag frontend
          ./codecov --verbose create-report             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --token "${{ secrets.CODECOV_TOKEN }}"

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests with coverage
        run: |
          go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov --verbose create-commit             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --ci-passed true             --token "${{ secrets.CODECOV_TOKEN }}"
          ./codecov --verbose upload-coverage             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --token "${{ secrets.CODECOV_TOKEN }}"             --file ./coverage.out             --flag backend
          ./codecov --verbose create-report             --slug earthcake2233/cakecake             --sha "${{ github.sha }}"             --token "${{ secrets.CODECOV_TOKEN }}"
