name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cakecake-vue/bilibili-vue/package-lock.json

      - name: Install dependencies
        working-directory: cakecake-vue/bilibili-vue
        run: npm ci

      - name: Run tests with coverage
        working-directory: cakecake-vue/bilibili-vue
        run: npm run coverage

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov upload-coverage \
            --git-service github \
            --slug earthcake2233/cakecake \
            --commit-sha ${{ github.sha }} \
            --branch main \
            --token "$CODECOV_TOKEN" \
            --file ./cakecake-vue/bilibili-vue/coverage/lcov.info \
            --flag frontend \
            --fail-on-error \
            --verbose

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests with coverage
        run: |
          go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          ./codecov upload-coverage \
            --git-service github \
            --slug earthcake2233/cakecake \
            --commit-sha ${{ github.sha }} \
            --branch main \
            --token "$CODECOV_TOKEN" \
            --file ./coverage.out \
            --flag backend \
            --fail-on-error \
            --verbose
